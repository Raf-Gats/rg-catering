<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Website HTML and CSS</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts Links For Icon -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
  </head>
  <body>
    <header>
      <nav class="navbar">
        <a class="logo" href="#">Chef Bocter<span>.</span></a>
        <ul class="menu-links">
          <li id="close-menu-btn" class="material-symbols-outlined">close</li>
          <li><a href="#">Home</a></li>
          <li><a href="#">Menu</a></li>
          <li><a href="#">Gallery</a></li>
          <li><a href="#">About us</a></li>
          <li><a href="#">Contact us</a></li>
        </ul>
        <span id="hamburger-btn" class="material-symbols-outlined">menu</span>
      </nav>
    </header>

    <section class="hero-section">
      <img src="chef-bocter.png" alt="Chef Bocter">

      <div class="content">
         <h2>Our Catering Services</h2>
        <p>
           We believe that every meal should be a celebration, and we are honored to be part of your most important moments.
        </p>
        <button class="book-now">Book Now</button>
      </div>
    </section>

    <script>
      const header = document.querySelector("header");
      const hamburgerBtn = document.querySelector("#hamburger-btn");
      const closeMenuBtn = document.querySelector("#close-menu-btn");

      // Toggle mobile menu on hamburger button click
      hamburgerBtn.addEventListener("click", () => header.classList.toggle("show-mobile-menu"));

      // Close mobile menu on close button click
      closeMenuBtn.addEventListener("click", () => hamburgerBtn.click());
    </script>

    <footer class="footer">
      <span>&copy; 2026 by: Raffy Gatal and Chef Bocter</span>
      <span class="separator">|</span>
      <span>All Rights Reserved</span>
    </footer>
    
  </body>
</html>
