
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Example</title>

    <style>
        .menu {
        display: none;
        }

        .menu.active {
        display: block;
        }

    </style>
</head>
<body>
     <h1>Interactive Example</h1>

     <h3>Selection 1 lessons</h3>

     <button id="toggleBtn">Menu</button>
  
  <div id="menu" class="menu">
    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#services">Services</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </div>

        <Button id="alertButton">Show Alert</Button>

        <button id="incrementButton">+ counter</button>
        <button id="decrementButton">- counter</button>
    
        <p>Counter: <span id="counter">0</span></p>

        <button id="resetButton">Reset</button>

            <label for="username">Enter your Name:</label>
            <input type="text" id="username" placeholder="Your name">
            <button id="greetButton">Greet Me</button>

         <p id="greetingMessage"></p>

        <button id="addParagraphButton">Add Paragraph</button>
     <br>
     <br>
         <div id="paragraphContainer"></div>


  <script src="script.js"></script>
    
</body>
</html>
